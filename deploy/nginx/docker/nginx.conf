# Nginx chạy trong container — proxy tới service Docker `backend:6510`
# Không cần cài Nginx trên host; mở firewall port 80 (và 443 khi có SSL).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    access_log /var/log/nginx/access.log;

    limit_req_zone $binary_remote_addr zone=tracking_req:10m rate=25r/s;
    limit_conn_zone $binary_remote_addr zone=tracking_conn:10m;

    server {
        listen 80;
        # _ cho phép test bằng IP; domain chính: tracking.david.io.vn
        server_name tracking.david.io.vn _;

        client_max_body_size 512k;
        client_body_timeout 12s;
        client_header_timeout 12s;
        send_timeout 20s;
        limit_req_status 429;
        limit_conn_status 429;
        limit_req zone=tracking_req burst=100 nodelay;
        limit_conn tracking_conn 50;

        location / {
            proxy_pass http://backend:6510;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 45s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffers 16 16k;
            proxy_busy_buffers_size 64k;
        }
    }
}
