# =============================================================================
# BẮT BUỘC nằm trong khối http { } — Ubuntu/Debian thường đã có:
#   include /etc/nginx/conf.d/*.conf;
# Sao chép file này vào: /etc/nginx/conf.d/00-tracking-limits.conf
# sudo nginx -t && sudo systemctl reload nginx
#
# Giảm tải khi 1 IP bắn request/cấp kết nối quá nhanh (không chặn được botnet
# nhiều IP — khi đó cần Cloudflare / WAF / firewall nhà cung cấp).
# =============================================================================

# Giới hạn tốc độ theo IP (token bucket). rate = trung bình tối đa / giây.
limit_req_zone $binary_remote_addr zone=tracking_req:10m rate=25r/s;

# Giới hạn số kết nối đồng thời từ 1 IP tới server này
limit_conn_zone $binary_remote_addr zone=tracking_conn:10m;
