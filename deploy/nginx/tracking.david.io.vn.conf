# ĐÃ CHUYỂN: dùng file canonical cho server có Nginx sẵn:
#   deploy/nginx/host/tracking.david.io.vn.conf
#   + deploy/SETUP_EXISTING_NGINX_HTTPS.md
#
# File này giữ làm bản đầy đủ (có limit_req) nếu bạn tự gộp zone vào http{} — dễ trùng tên với site khác.
#
# DNS A: tracking.david.io.vn → 160.191.50.186 (hoặc IP server hiện tại)
#
# 1) Sao chép deploy/nginx/conf.d/00-tracking-limits.conf → /etc/nginx/conf.d/
# 2) Sao chép file này → /etc/nginx/sites-available/tracking.david.io.vn
# 3) sudo ln -sf /etc/nginx/sites-available/tracking.david.io.vn /etc/nginx/sites-enabled/
# 4) sudo nginx -t && sudo systemctl reload nginx
#
# Backend chỉ lộ trên loopback — Nginx proxy tới 127.0.0.1:6510
#
# --- Hardening (chống flood / slowloris nhẹ, giảm tải backend) ---
# - limit_req / limit_conn: cần file conf.d 00-tracking-limits.conf
# - Chỉnh rate= và burst= nếu traffic hợp lệ bị 429 (tăng nhẹ) hoặc muốn siết hơn

server {
    listen 80;
    listen [::]:80;
    server_name tracking.david.io.vn;

    # Body nhỏ — API tracking JSON (khớp backend ~256kb, dư một chút)
    client_max_body_size 512k;

    # Chống client treo khi gửi header/body chậm (slowloris kiểu cũ)
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 20s;

    # 429 khi vượt hạn
    limit_req_status 429;
    limit_conn_status 429;
    limit_req zone=tracking_req burst=100 nodelay;
    limit_conn tracking_conn 50;

    location / {
        proxy_pass http://127.0.0.1:6510;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout proxy — tránh worker Nginx bị giữ lâu bởi backend chậm / tấn công
        proxy_connect_timeout 10s;
        proxy_send_timeout 45s;
        proxy_read_timeout 60s;

        # Giới hạn buffer upstream (tránh response bất thường chiếm RAM)
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
    }
}

