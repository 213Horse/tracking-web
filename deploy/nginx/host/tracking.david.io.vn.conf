# Site tracking — proxy tới Docker backend (127.0.0.1:6510).
# Không dùng limit_req ở đây để tránh trùng tên zone với site khác trên cùng server.
# (Tuỳ chọn rate limit: xem optional-rate-limits.conf cùng thư mục.)
#
# Cài đặt:
#   sudo cp /opt/tracking/deploy/nginx/host/tracking.david.io.vn.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/tracking.david.io.vn.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS: sudo certbot --nginx -d tracking.david.io.vn
# (Certbot sẽ sửa file này, thêm ssl_certificate và khối listen 443.)

server {
    listen 80;
    listen [::]:80;
    server_name tracking.david.io.vn;

    client_max_body_size 512k;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 20s;

    location / {
        proxy_pass http://127.0.0.1:6510;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 45s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
    }
}
