# TUỲ CHỌN — chỉ thêm nếu muốn rate limit riêng cho tracking.david.io.vn
# và CHƯA có zone trùng tên trong Nginx.
#
#   sudo cp .../optional-rate-limits.conf /etc/nginx/conf.d/90-tracking-david-limits.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Sau đó trong sites-available/tracking.david.io.vn.conf, trong khối server { } thêm:
#   limit_req_status 429;
#   limit_conn_status 429;
#   limit_req zone=tracking_david_io_req burst=100 nodelay;
#   limit_conn tracking_david_io_conn 50;

limit_req_zone $binary_remote_addr zone=tracking_david_io_req:10m rate=25r/s;
limit_conn_zone $binary_remote_addr zone=tracking_david_io_conn:10m;
